apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: coff
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/asimvarol/coff-campaign-engine/api:latest
          ports:
            - containerPort: 3002
          envFrom:
            - secretRef:
                name: coff-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: API_PORT
              value: '3002'
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: coff
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 3002
  type: ClusterIP
