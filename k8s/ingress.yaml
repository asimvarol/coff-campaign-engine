apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coff-ingress
  namespace: coff
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: '100'
    nginx.ingress.kubernetes.io/rate-limit-window: 1m
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.coff.ai
        - api.coff.ai
      secretName: coff-tls
  rules:
    - host: app.coff.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
    - host: api.coff.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 80
