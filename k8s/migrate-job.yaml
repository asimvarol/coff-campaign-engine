apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate
  namespace: coff
spec:
  template:
    spec:
      containers:
        - name: migrate
          image: ghcr.io/asimvarol/coff-campaign-engine/web:latest
          command: ['bunx', 'prisma', 'migrate', 'deploy', '--schema=packages/db/prisma/schema.prisma']
          envFrom:
            - secretRef:
                name: coff-secrets
      restartPolicy: Never
  backoffLimit: 3
