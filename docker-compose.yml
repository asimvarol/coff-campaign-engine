version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: coff-postgres
    environment:
      POSTGRES_USER: coff
      POSTGRES_PASSWORD: coff_dev_password
      POSTGRES_DB: coff_campaign_engine
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U coff']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: coff-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
