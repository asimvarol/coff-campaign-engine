version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coff_campaign_engine
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3001:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/coff_campaign_engine
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:3001
      NEXT_PUBLIC_API_URL: http://localhost:3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3002:3002'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/coff_campaign_engine
      REDIS_URL: redis://redis:6379
      API_PORT: '3002'
      NEXT_PUBLIC_WEB_URL: http://localhost:3001
      NEXT_PUBLIC_API_URL: http://localhost:3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: bunx prisma migrate deploy --schema=packages/db/prisma/schema.prisma
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/coff_campaign_engine
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

volumes:
  postgres_data:
  redis_data:
