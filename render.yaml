services:
  - type: web
    name: coff-campaign-engine
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set in Render Dashboard
      - key: NEXTAUTH_SECRET
        sync: false # Set in Render Dashboard
      - key: NEXTAUTH_URL
        value: https://coff-campaign-engine.onrender.com
      - key: FAL_AI_KEY
        sync: false # Set in Render Dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false # Set in Render Dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false # Set in Render Dashboard
      - key: ENABLE_AUTOPILOT
        value: "true"
      - key: ENABLE_AGENCY_MODE
        value: "true"
      - key: PORT
        value: "3000"
