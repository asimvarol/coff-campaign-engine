        value: 1052642071406-gcfutdscdp8cmf524nkp41p7k0nqiq3g.apps.googleusercontent.com
      - key: GOOGLE_CLIENT_SECRET
        value: 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
