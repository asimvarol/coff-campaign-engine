# Railway Configuration
# Docs: https://docs.railway.app/deploy/config-as-code

[build]
builder = "NIXPACKS"
buildCommand = "bun install && bun run build --filter=@repo/web"

[deploy]
startCommand = "cd apps/web && bun start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "web"
